<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./searchstyles.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <img src="https://raw.githubusercontent.com/janakir2006/JAVA-PICS/refs/heads/main/logo.webp" alt="logo pic">
                </div>
                <ul>
					<li><a href="http://localhost:8080/home.html">Home</a></li>
					<li><a href="http://localhost:8080/view.html">View </a></li>
					<li><a href="http://localhost:8080/search.html">Search</a></li>
					<li><a href="http://localhost:8080/book.html">Book</a></li>
					<li><a href="http://localhost:8080/bPass.html">My Trips</a></li>
					<li><a href="http://localhost:8080/register.html" class="register-btn">Register</a></li>

                </ul>    
            </nav>
        </div>
    </header>
    <!--Header portion ends-->


    <!--Main Content starts-->
<section class="main-content">
    <div class="main-heading">
        <h1>Search Using Dates And Destinations</h1>
    </div>
    
    <div class="filter-form">
        <form id="searchForm">
            <label for="from">Departure</label>
            <select name="from" id="from" required>
                <option value="" selected disabled>-- Select an option --</option>
            </select>

            <label for="to">Destination</label>
            <select name="to" id="to" required>
               <option value="" selected disabled>-- Select an option --</option>
            </select>
            
            <!-- Start Date/Time -->
            <label for="startDateTime">Start Date/Time</label>
            <input type="datetime-local" id="startDateTime" name="startDateTime" required>

            <!-- End Date/Time -->
            <label for="endDateTime">End Date/Time</label>
            <input type="datetime-local" id="endDateTime" name="endDateTime" required>

        </form>
        <div class="submit-btn-container">
            <button type="submit" form="searchForm">Search Flights</button>
        </div>
    </div>
</section>

<!--getting searched tickets-->
<section class="all-tickets">
	<div id="all-flights">
	</div>
</section>




<script>
	document.addEventListener("DOMContentLoaded", function () {
		    fetch("http://localhost:8080/locations")
		        .then(response => response.json())
		        .then(data => {
		            const fromSelect = document.getElementById("from");
		            const toSelect = document.getElementById("to");

		            data.forEach(location => {
		                const option1 = document.createElement("option");
		                option1.value = location;
		                option1.textContent = location;
		                fromSelect.appendChild(option1);

		                const option2 = document.createElement("option");
		                option2.value = location;
		                option2.textContent = location;
		                toSelect.appendChild(option2);
		            });
		        })
		        .catch(error => {
		            console.error("Error loading locations:", error);
		            alert("Failed to load airport locations.");
		        });
		});

	function formatDate(input) {
		const date = new Date(input);

		const day = String(date.getDate()).padStart(2, '0');
		const month = date.toLocaleString('en-US', { month: 'short' }); // e.g., "May"
		const year = date.getFullYear();

		const hours = String(date.getHours()).padStart(2, '0');
		const minutes = String(date.getMinutes()).padStart(2, '0');
		const seconds = String(date.getSeconds()).padStart(2, '0');
		return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
		}
document.getElementById("searchForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Prevent page reload

    // Get values from the form
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const startDateTime = document.getElementById("startDateTime").value;
	const endDateTime = document.getElementById("endDateTime").value;
	
    // Construct the request body
    const requestData = {
        from: from,
        to: to,
        fromDate: startDateTime,
		toDate: endDateTime
    };

    // Send data to the backend using fetch
    fetch("http://localhost:8080/searchFlights", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(requestData)
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Network response was not ok");
        }
        return response.json(); // or text() based on backend
    })
    .then(data => {
        console.log("Flights received:", data);
		const tableBody = document.getElementById('all-flights');
		tableBody.innerHTML = "";
		data.forEach(flight => {
		    const row = document.createElement('div');
		    row.className = 'ticket';
		    row.innerHTML = `
				<div class="row"><span>Flight Number:</span> <div class="blank-line">${flight.flightNumber}</div></div>
				<div class="row"><span>From:</span> <div class="blank-line">${flight.from}</div></div>
				<div class="row"><span>To:</span> <div class="blank-line">${flight.to}</div></div>
				<div class="row"><span>Date:</span> <div class="blank-line small">${formatDate(flight.date)}</div></div>
				<div class="row"><span>Duration:</span> <div class="blank-line">${flight.duration} hours</div></div>
				<div class="row"><span>Price:</span> <div class="blank-line">${flight.price}</div></div>
				<div class="row"><span>Seats Available:</span> <div class="blank-line">${flight.seatsAvailable}</div></div>
		    `;
		    tableBody.appendChild(row);
		  });

		
		document.getElementById("all-flights").scrollIntoView({ behavior: "smooth" });

    })
    .catch(error => {
        console.error("Error:", error);
        alert("Error occurred while searching flights.");
    });
});
</script>




    
    <!--Main Content ends-->
</body>
</html>

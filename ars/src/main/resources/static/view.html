<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="viewstyles.css">

</head>
<body>
    <!--Header portion starts-->
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <img src="https://raw.githubusercontent.com/janakir2006/JAVA-PICS/refs/heads/main/logo.webp" alt="logo pic">
                </div>
                <ul>
                    <li><a href="http://localhost:8080/home.html">Home</a></li>
                    <li><a href="http://localhost:8080/view.html">View </a></li>
                    <li><a href="http://localhost:8080/search.html">Search</a></li>
                    <li><a href="http://localhost:8080/book.html">Book</a></li>
                    <li><a href="http://localhost:8080/bPass.html">My Trips</a></li>
                    <li><a href="http://localhost:8080/register.html" class="register-btn">Register</a></li>

                </ul>    
            </nav>
        </div>
    </header>
    <!--Header portion ends-->

    <!--ticket starts-->
    <section class="all-tickets">
        <div id="all-flights">
			
        </div>
    </section>
	
	<script>
		function formatDate(input) {
		  const date = new Date(input);

		  const day = String(date.getDate()).padStart(2, '0');
		  const month = date.toLocaleString('en-US', { month: 'short' }); // e.g., "May"
		  const year = date.getFullYear();

		  const hours = String(date.getHours()).padStart(2, '0');
		  const minutes = String(date.getMinutes()).padStart(2, '0');
		  const seconds = String(date.getSeconds()).padStart(2, '0');

		  return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
		}		
		
		
	  fetch('http://localhost:8080/flights')
	    .then(response => {
	      if (!response.ok) {
	        throw new Error('Failed to fetch flights');
	      }
	      return response.json();
	    })
	    .then(data => {
	      const tableBody = document.getElementById('all-flights');
		  
	      data.forEach(flight => {
	        const row = document.createElement('div');
		    row.className = 'ticket';
	        row.innerHTML = `
				<div class="row"><span>Flight Number:</span> <div class="blank-line">${flight.flightNumber}</div></div>
				<div class="row"><span>From:</span> <div class="blank-line">${flight.from}</div></div>
				<div class="row"><span>To:</span> <div class="blank-line">${flight.to}</div></div>
				<div class="row"><span>Date:</span> <div class="blank-line small">${formatDate(flight.date)}</div></div>
				<div class="row"><span>Duration:</span> <div class="blank-line">${flight.duration} hours</div></div>
				<div class="row"><span>Price:</span> <div class="blank-line">${flight.price} $</div></div>
				<div class="row"><span>Seats Available:</span> <div class="blank-line">${flight.seatsAvailable}</div></div>
	        `;
	        tableBody.appendChild(row);
	      });
	    })
	    .catch(error => {
	      console.error('Error:', error);
	    });
	</script>
		
</body>
</html>

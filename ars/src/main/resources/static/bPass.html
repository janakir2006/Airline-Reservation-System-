  <script>
    // Prompt for the username
    const username = prompt("Enter your username");

    // Fetch ticket details using the username
    fetch(`http://localhost:8080/myTickets?username=${encodeURIComponent(username)}`)
      .then(response => {
        if (!response.ok) {
          throw new Error("Ticket not found or server error");
        }
        return response.json(); // Convert response to JSON
      })
      .then(data => {
		const allTickets = document.getElementById('all-tickets');

		data.forEach(ticket => {
		  const tkt = document.createElement('div');
		  tkt.className = 'ticket';
		  
		  tkt.innerHTML = `
		  <div class="ticket-left">
		    <h2>Air Company</h2><p>BOARDING PASS</p>
		    <div class="barcode"></div>
		    <div class="gate-time">
		      <div><p><strong>GATE</strong></p><div class="line">K19</div></div>
		    </div>
		  </div>
		  <div class="ticket-right">
		    <div class="details-row">
		      <div><h3>Username:</h3><div class="line">${ticket.username}</div>
		      </div>
		      <div>
		        <h3>Passenger Name:</h3>
		        <div class="line">${ticket.customerName}</div>
		      </div>
		    </div>
		    <div class="details-row">
		      <div>
		        <h3>Flight Number:</h3>
		        <div class="line">${ticket.flightNumber}</div>
		      </div>
		      <div>
		        <h3>Class:</h3>
		        <div class="line">${ticket.travelClass}</div>
		      </div>
		    </div>
		    <div class="details-row">
		      <div>
		        <h3>Departure Date:</h3>
		        <div class="line">${formatDate(ticket.flightTime)}</div>
		      </div>
		      <div>
		        <h3>Time:</h3>
		        <div class="line">${formatTime(ticket.flightTime)}</div>
		      </div>
		      <div>
		        <h3>From:</h3>
		        <div class="line">${ticket.from}</div>
		      </div>
		    </div>
		    <div class="details-row">
		      <div>
		        <h3>To:</h3>
		        <div class="line">${ticket.to}</div>
		      </div>
		      <div>
		        <h3>Meal Preference:</h3>
		        <div class="line">${ticket.mealPreferences.mainMeal} - ${ticket.mealPreferences.refreshment}</div>
		      </div>
		      <div>
		        <h3>Payment Mode:</h3>
		        <div class="line">${ticket.paymentMode}</div>
		      </div>
		    </div>
		    <div class="price">
		      Price: <span class="line short-line">${ticket.price}</span>
		    </div>
		  </div>
		  `;		  
		  
		  allTickets.appendChild(tkt);
		});
        
      })
      .catch(error => {
        console.error("Error fetching ticket:", error);
        alert("Could not load ticket details. Please try again.");
      });

	function formatDate(input) {
	  const date = new Date(input);

	  const day = String(date.getDate()).padStart(2, '0');
	  const month = date.toLocaleString('en-US', { month: 'short' }); // e.g., "May"
	  const year = date.getFullYear();

	  return `${day}-${month}-${year}`;
	}		

	function formatTime(input) {
	  const date = new Date(input);

	  const hours = String(date.getHours()).padStart(2, '0');
	  const minutes = String(date.getMinutes()).padStart(2, '0');

	  return `${hours}:${minutes}`;
	}		
  </script>

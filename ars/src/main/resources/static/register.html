<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration Form</title>
  <link rel="stylesheet" href="./registerstyles.css">
</head>
<body>
  <div class="form-container">
    <h2>Registration Form</h2>
    <form action="/registerCustomer" method="post" id="registerForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="passport">Passport Number</label>
      <input type="text" id="passport" name="passport" required>

      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>
      
      <label for="pass">Password</label>
      <input type="text" id="pass" name="pass" required>

      <button type="submit">Register</button>
      <button type="button" onclick="window.location.href='http://localhost:8080/home.html'">Cancel</button>
    </form>
  </div>
  
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (event) {
      event.preventDefault(); // Prevent default form submission

      // Collect form data
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        passportNumber: document.getElementById('passport').value,
        username: document.getElementById('username').value
        password:document.getElementById('pass').value
      };

      // Send data to server
      fetch('http://localhost:8080/registerCustomer', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(formData)
      })
      .then(response => {
        if (!response.ok) throw new Error('User Already Registe	red or Invalid credentials');
        return response.text();
      })
      .then(data => {
        alert("Registration successful!");
        document.getElementById("registerForm").reset(); // Clear form
		window.location.href = "/home.html";
      })
      .catch(error => {
        alert("Error: " + error.message);
      });
    });
  </script>

</body>
</html>
